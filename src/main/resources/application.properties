spring.application.name=demo-reservas

server.port=${SERVER_PORT:8080}

# Base de datos
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/reservas}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:1234}

#iquibase
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


# Microservicio notificaciones
notificaciones.url=${NOTIFICACIONES_URL:http://localhost:8081/notificaciones}

# JWT
jwt.secret=${JWT_SECRET:dGVzdFNlY3JldEtleVBhcmFKV1RGaXJtYWRvQ29uSFMyNTY=}
jwt.expiration=${JWT_EXPIRATION:21600000}

